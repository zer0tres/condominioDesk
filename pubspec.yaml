name: condominio_desk
description: AR3000 — Cabral Corporate & Offices
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo app.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/nov.png
    - assets/logo app.jpg
dependency_overrides:
  app_links: 6.4.1
